<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="adn-page-title">Índice de Documentos Servidos - LFC STUDIO</title>
    <link rel="stylesheet" href="../../../IX. WBS y Planificacion/wbs-shared.css">
    <style>
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .doc-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }
        .doc-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px var(--accent-transparent);
        }
        .doc-card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .doc-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .doc-link {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .link-html { background: var(--accent); color: var(--primary); }
        .link-word { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }
        .link-html:hover { filter: brightness(1.2); }
        .link-word:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="lfc-sidebar-container"></div>
    <div class="main-content-wrapper">
        <div class="premium-card" style="margin-bottom: 3rem;">
            <h1 class="premium-title">🍽️ ENTREGABLES SERVIDOS</h1>
            <p style="opacity: 0.7;">Documentación técnica consolidada, saneada bajo estándar PTC Virtual y lista para stakeholders.</p>
        </div>

        <div class="doc-grid" id="docs-container">
            <!-- Carga dinámica por script o hardcodeada basada en archivos existentes -->
        </div>
    </div>

    <script src="../../../IX. WBS y Planificacion/lfc-terminology.js"></script>
    <script src="../../../IX. WBS y Planificacion/sidebar-component.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.LFC_TERMINOLOGY) {
                const term = window.LFC_TERMINOLOGY;
                document.getElementById('adn-page-title').textContent = `Documentos Servidos - ${term.APP_SHORT_NAME}`;
            }

            const docs = [
                { id: "S01", grp: "Sistemas", name: "SISTEMA_01: Control y Señalización", file: "SISTEMA_01_Control_y_Senalizacion_EJECUTIVO" },
                { id: "S02", grp: "Sistemas", name: "SISTEMA_02: Telecomunicaciones (TETRA)", file: "SISTEMA_02_Telecomunicaciones_EJECUTIVO" },
                { id: "S03", grp: "Sistemas", name: "SISTEMA_03: ITS y Seguridad+", file: "SISTEMA_03_ITS_y_Seguridad_EJECUTIVO" },
                { id: "S04", grp: "Sistemas", name: "SISTEMA_04: Material Rodante (V-Block)", file: "SISTEMA_04_Material_Rodante_EJECUTIVO" },
                { id: "S05", grp: "Sistemas", name: "SISTEMA_05: Infraestructura Operativa", file: "SISTEMA_05_Infraestructura_Operativa_EJECUTIVO" },
                { id: "S06", grp: "Sistemas", name: "SISTEMA_06: Integración y Coordinación", file: "SISTEMA_06_Integracion_y_Coordinacion_EJECUTIVO" },
                
                { id: "E01", grp: "Especialidades", name: "ESPECIALIDAD_01: Ingeniería Civil", file: "ESPECIALIDAD_01_Ingenieria_Civil_EJECUTIVO" },
                { id: "E02", grp: "Especialidades", name: "ESPECIALIDAD_02: Ingeniería Eléctrica", file: "ESPECIALIDAD_02_Ingenieria_Electrica_EJECUTIVO" },
                { id: "E03", grp: "Especialidades", name: "ESPECIALIDAD_03: Ingeniería Mecánica", file: "ESPECIALIDAD_03_Ingenieria_Mecanica_EJECUTIVO" },
                { id: "E04", grp: "Especialidades", name: "ESPECIALIDAD_04: Ingeniería de Sistemas", file: "ESPECIALIDAD_04_Ingenieria_Sistemas_EJECUTIVO" },
                { id: "E05", grp: "Especialidades", name: "ESPECIALIDAD_05: Ingeniería Ambiental", file: "ESPECIALIDAD_05_Ingenieria_Ambiental_EJECUTIVO" },
                
                { id: "G01", grp: "Gestión", name: "GESTIÓN: Alcance y Objetivos", file: "GESTION_EJECUTIVO_Alcance_y_Objetivos" },
                { id: "G02", grp: "Gestión", name: "GESTIÓN: Cambios y Decisiones", file: "GESTION_EJECUTIVO_Cambios_y_Decisiones_Tecnicas" },
                { id: "G03", grp: "Gestión", name: "GESTIÓN: Cronograma y Recursos", file: "GESTION_EJECUTIVO_Cronograma_y_Recursos" }
            ];

            const container = document.getElementById('docs-container');
            container.innerHTML = docs.map(doc => `
                <div class="doc-card">
                    <div style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5; margin-bottom: 0.5rem;">[${doc.grp.toUpperCase()}] SICC-LFC2-ID-${doc.id}</div>
                    <h3>${doc.name}</h3>
                    <p style="font-size: 0.85rem; opacity: 0.7; line-height: 1.5;">Ingeniería ejecutiva consolidada. Libre de tecnologías legacy. SSOT: DBCD_CRITERIA.md</p>
                    <div class="doc-links">
                        <a href="${doc.file}.html" class="doc-link link-html">🌐 VER HTML</a>
                        <a href="../WORD/${doc.file}.docx" class="doc-link link-word">📄 WORD (.DOCX)</a>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
