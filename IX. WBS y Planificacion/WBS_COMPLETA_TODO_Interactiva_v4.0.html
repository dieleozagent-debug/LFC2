<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFC Dashboard - WBS Interactiva v5.0 Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: hsl(210, 30%, 20%);
            --accent: hsl(45, 100%, 50%);
            --success: hsl(150, 60%, 40%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e3c72, #2a5298, #1a1a1a);
            color: var(--text-main);
            padding: 2.5rem;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-weight: 300;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        
        .stats-bar {
            background: rgba(0,0,0,0.2);
            padding: 2rem;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
        }
        
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-top: 0.5rem;
        }
        
        .filtros {
            padding: 1.5rem 2.5rem;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filtro-btn {
            padding: 0.7rem 1.4rem;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .filtro-btn:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .filtro-btn.activo {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
        }
        
        .btn-nuevo-capitulo {
            padding: 0.8rem 1.6rem;
            background: transparent;
            color: white;
            border: 1px solid white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin-left: auto;
            transition: all 0.3s;
        }
        
        .btn-nuevo-capitulo:hover {
            background: white;
            color: black;
        }
        
        .capitulo-seccion {
            margin: 2.5rem;
        }
        
        .capitulo-header {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }
        
        .capitulo-header:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.01);
        }
        
        .capitulo-titulo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .capitulo-count {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
        }
        
        .item-card {
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
            transition: all 0.4s;
        }
        
        .item-card:hover {
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: translateX(10px);
        }
        
        .item-header {
            padding: 1.2rem 2rem;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .item-codigo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
        }
        
        .item-modificable {
            border: 1px solid var(--success);
            color: var(--success);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .item-body {
            padding: 2rem;
        }
        
        .item-descripcion {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .item-valores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            padding: 2rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        
        .valor-box {
            text-align: left;
        }
        
        .valor-label {
            font-size: 0.7rem;
            color: white;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .valor-dato {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .botones-accion {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 0.8rem 1.6rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        
        .btn-dt {
            background: var(--accent);
            color: var(--primary);
        }
        
        .btn-dt:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
        }
        
        /* Modal Glass */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        
        .modal-content {
            background: rgba(30, 30, 30, 0.95);
            margin: 5% auto;
            padding: 0;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 800px;
            border-radius: 24px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }
        
        .modal-header {
            padding: 2.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .close {
            color: white;
            opacity: 0.5;
            float: right;
            font-size: 2rem;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 3rem;
            color: white;
        }
        
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .oculto {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 WBS PRESUPUESTAL COMPLETA v5.0</h1>
            <p>APP La Dorada-Chiriguaná | Gestión Ejecutiva Premium</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-items">0</div>
                <div class="stat-label">ÍTEMS TOTALES</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-capitulos">6</div>
                <div class="stat-label">CAPÍTULOS</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-modificables">0</div>
                <div class="stat-label">MODIFICABLES</div>
            </div>
        </div>

        <div class="filtros">
            <button class="filtro-btn activo" onclick="filtrarItems('todos')">📋 Todos</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-1')">Cap 1: Control</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-2')">Cap 2: Telecom</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-3')">Cap 3: Seguridad</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-4')">Cap 4: Pasos Nivel</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-5')">Cap 5: Centro Control</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-6')">Cap 6: Material Rodante</button>
            <button class="btn-nuevo-capitulo" onclick="abrirModalNuevoCapitulo()">➕ Proponer Nuevo Capítulo</button>
        </div>

        <div id="wbs-container">
            <!-- Los capítulos e ítems se cargan aquí dinámicamente -->
        </div>
    </div>

    <!-- Modal DT -->
    <div id="modalDT" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="cerrarModal('modalDT')">&times;</span>
                <h2 id="modal-dt-titulo">Crear Decisión Técnica</h2>
            </div>
            <div class="modal-body" id="modal-dt-body">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Capítulo -->
    <div id="modalNuevoCapitulo" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="cerrarModal('modalNuevoCapitulo')">&times;</span>
                <h2>➕ Proponer Nuevo Capítulo</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Número de Capítulo:</label>
                    <input type="number" id="nuevo-cap-numero" class="form-control" value="7" min="7" max="20">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Nombre del Capítulo:</label>
                    <input type="text" id="nuevo-cap-nombre" class="form-control" placeholder="Ej: SISTEMAS DE ENERGÍA">
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Descripción del Capítulo:</label>
                    <textarea id="nuevo-cap-descripcion" class="form-control" rows="4" placeholder="Describe el alcance y contenido del nuevo capítulo..."></textarea>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Justificación Técnica:</label>
                    <textarea id="nuevo-cap-justificacion" class="form-control" rows="4" placeholder="Por qué se necesita este nuevo capítulo..."></textarea>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Presupuesto Estimado (COP):</label>
                    <input type="number" id="nuevo-cap-presupuesto" class="form-control" placeholder="Estimación inicial">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button class="btn btn-dt" onclick="generarDTNuevoCapitulo()">📋 Generar DT de Nuevo Capítulo</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cargar datos desde archivos JS -->
    <script src="datos_wbs_TODOS_items.js?v=2.0.0"></script>
    
    <script>
        // Lógica de filtrado y carga dinámica (Simplificada para v5.0)
        let wbsData = window.datos_wbs || { items: [] };
        
        function cargarWBS() {
            const container = document.getElementById('wbs-container');
            container.innerHTML = '';
            
            const itemsPorCapitulo = {};
            wbsData.items.forEach(item => {
                const cap = item.codigo.split('.')[0];
                if (!itemsPorCapitulo[cap]) itemsPorCapitulo[cap] = [];
                itemsPorCapitulo[cap].push(item);
            });

            document.getElementById('total-items').textContent = wbsData.items.length;
            document.getElementById('total-modificables').textContent = wbsData.items.filter(i => i.modificable).length;

            Object.keys(itemsPorCapitulo).sort().forEach(cap => {
                const seccion = document.createElement('div');
                seccion.className = 'capitulo-seccion';
                seccion.dataset.capitulo = cap;
                
                const names = {
                    '1': 'Control y Señalización',
                    '2': 'Telecomunicaciones',
                    '3': 'ITS y Seguridad',
                    '4': 'Pasos a Nivel',
                    '5': 'Centro de Control',
                    '6': 'Material Rodante'
                };

                seccion.innerHTML = `
                    <div class="capitulo-header" onclick="toggleCapitulo('${cap}')">
                        <div class="capitulo-titulo">CAPÍTULO ${cap}: ${names[cap] || 'Otros'}</div>
                        <div class="capitulo-count">${itemsPorCapitulo[cap].length} ítems</div>
                    </div>
                    <div id="items-capitulo-${cap}">
                        ${itemsPorCapitulo[cap].map(item => `
                            <div class="item-card">
                                <div class="item-header">
                                    <div class="item-codigo">${item.codigo}</div>
                                    <div class="item-modificable">V3.0 Saneado</div>
                                </div>
                                <div class="item-body">
                                    <div class="item-descripcion">${item.descripcion}</div>
                                    <div class="item-valores">
                                        <div class="valor-box"><div class="valor-label">Cantidad</div><div class="valor-dato">${item.cantidad}</div></div>
                                        <div class="valor-box"><div class="valor-label">Unidad</div><div class="valor-dato">${item.unidad}</div></div>
                                        <div class="valor-box"><div class="valor-label">Total (COP)</div><div class="valor-dato">$${item.total_cop.toLocaleString()}</div></div>
                                    </div>
                                    <div class="botones-accion">
                                        <button class="btn btn-dt" onclick="abrirModalDT('${item.codigo}')">PROPONER CAMBIO</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(seccion);
            });
        }

        function toggleCapitulo(cap) {
            const el = document.getElementById(`items-capitulo-${cap}`);
            el.classList.toggle('oculto');
        }

        function filtrarItems(filtro) {
            const secciones = document.querySelectorAll('.capitulo-seccion');
            document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('activo'));
            event.target.classList.add('activo');
            
            secciones.forEach(s => {
                if (filtro === 'todos') s.style.display = 'block';
                else s.style.display = filtro.endsWith(s.dataset.capitulo) ? 'block' : 'none';
            });
        }

        function abrirModalDT(codigo) { document.getElementById('modalDT').style.display = 'block'; }
        function abrirModalNuevoCapitulo() { document.getElementById('modalNuevoCapitulo').style.display = 'block'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onload = cargarWBS;
    </script>
</body>
</html>
