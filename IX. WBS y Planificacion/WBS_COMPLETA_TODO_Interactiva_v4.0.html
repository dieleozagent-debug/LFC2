<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFC Dashboard - WBS Interactiva v5.0 Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="wbs-shared.css">
</head>
<body>
    <div id="lfc-sidebar-container"></div>
    <div class="main-content-wrapper">
        <div class="premium-card" style="margin-bottom: 3rem; position: relative; overflow: hidden;">
            <div id="adn-version-tag" style="position: absolute; top: 10px; right: 20px; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">CARGANDO ADN...</div>
            <h1 class="premium-title" id="main-dns-title">DASHBOARD LFC</h1>
            <p id="main-dns-subtitle" style="opacity: 0.7; font-weight: 300;">Cargando configuración...</p>
        </div>

        <div class="stats-bar" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="premium-card" style="text-align: center; padding: 1.5rem;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--accent);" id="total-items">0</div>
                <div style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">ÍTEMS TOTALES</div>
            </div>
            <div class="premium-card" style="text-align: center; padding: 1.5rem;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--accent);" id="total-capitulos">6</div>
                <div style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">CAPÍTULOS</div>
            </div>
            <div class="premium-card" style="text-align: center; padding: 1.5rem;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--accent);" id="total-modificables">0</div>
                <div style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">MODIFICABLES</div>
            </div>
        </div>

        <div class="premium-card" style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
            <style>
                .filtro-btn {
                    padding: 0.6rem 1.2rem;
                    border: 1px solid var(--glass-border);
                    background: rgba(255,255,255,0.05);
                    color: white;
                    border-radius: 50px;
                    cursor: pointer;
                    transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
                    font-size: 0.8rem;
                    font-weight: 600;
                    backdrop-filter: blur(4px);
                }
                .filtro-btn:hover, .filtro-btn.activo {
                    background: var(--accent);
                    color: var(--primary);
                    border-color: var(--accent);
                    transform: translateY(-2px);
                    box-shadow: 0 4px 15px var(--accent-transparent);
                }
                .capitulo-seccion {
                    margin-bottom: 2rem;
                    animation: fadeInScale 0.5s ease-out forwards;
                }
                .capitulo-header {
                    background: var(--glass-bg);
                    backdrop-filter: blur(10px);
                    padding: 1.5rem 2rem;
                    border-radius: 20px;
                    border: 1px solid var(--glass-border);
                    cursor: pointer;
                    margin-bottom: 1.5rem;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    transition: all 0.4s;
                    box-shadow: var(--glass-shadow);
                }
                .capitulo-header:hover { 
                    border-color: var(--accent);
                    background: var(--card-bg-hover);
                }
                .capitulo-titulo {
                    font-size: 1.2rem;
                    font-weight: 800;
                    color: var(--accent);
                    letter-spacing: 1px;
                }
                .item-card {
                    background: rgba(255, 255, 255, 0.03);
                    border: 1px solid var(--glass-border);
                    border-radius: 12px;
                    padding: 1.2rem;
                    margin-bottom: 0.8rem;
                    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                    display: grid;
                    grid-template-columns: 80px 1fr 250px 120px;
                    align-items: center;
                    gap: 1.5rem;
                }
                .item-card:hover { 
                    border-color: var(--accent); 
                    transform: translateX(5px);
                    background: rgba(255,255,255,0.06);
                    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
                }
                .item-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    border-bottom: 1px solid rgba(255,255,255,0.1);
                    padding-bottom: 0.5rem;
                }
                .item-codigo {
                    font-family: monospace;
                    font-weight: 800;
                    color: var(--accent);
                    font-size: 1rem;
                }
                .item-descripcion {
                    font-size: 0.95rem;
                    line-height: 1.6;
                    opacity: 0.9;
                }
                .item-valores {
                    display: grid;
                    grid-template-columns: repeat(3, 1fr);
                    gap: 1rem;
                }
                .valor-box {
                    background: rgba(0,0,0,0.2);
                    padding: 0.8rem;
                    border-radius: 12px;
                    text-align: center;
                }
                .valor-label {
                    font-size: 0.6rem;
                    text-transform: uppercase;
                    letter-spacing: 1px;
                    opacity: 0.5;
                    margin-bottom: 0.3rem;
                }
                .valor-dato {
                    font-weight: 700;
                    color: var(--accent);
                }
                .oculto { display: none !important; }
                
                /* Estilos Base para Modales Premium */
                .modal {
                    display: none;
                    position: fixed;
                    z-index: 3000;
                    left: 0;
                    top: 0;
                    width: 100%;
                    height: 100%;
                    overflow: auto;
                    background-color: rgba(10, 25, 47, 0.85);
                    backdrop-filter: blur(15px);
                    -webkit-backdrop-filter: blur(15px);
                }
                .modal-content {
                    background: var(--glass-bg);
                    margin: 5% auto;
                    padding: 0;
                    border: 1px solid var(--glass-border);
                    width: 90%;
                    max-width: 800px;
                    border-radius: 24px;
                    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
                    animation: slideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
                    position: relative;
                    overflow: hidden;
                }
                @keyframes slideUp {
                    from { transform: translateY(30px); opacity: 0; }
                    to { transform: translateY(0); opacity: 1; }
                }
                .modal-header {
                    padding: 2rem;
                    background: rgba(255,255,255,0.03);
                    border-bottom: 1px solid var(--glass-border);
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }
                .modal-header h2 {
                    margin: 0;
                    color: var(--accent);
                    font-size: 1.5rem;
                    font-weight: 800;
                }
                .modal-body {
                    padding: 2rem;
                }
                .form-group {
                    margin-bottom: 1.5rem;
                }
                .form-label {
                    display: block;
                    font-size: 0.75rem;
                    text-transform: uppercase;
                    letter-spacing: 1px;
                    margin-bottom: 0.6rem;
                    color: var(--accent);
                    opacity: 0.8;
                }
                .form-control {
                    width: 100%;
                    padding: 1rem 1.2rem;
                    background: rgba(255,255,255,0.05);
                    border: 1px solid var(--glass-border);
                    border-radius: 12px;
                    color: white;
                    font-family: inherit;
                    font-size: 0.95rem;
                    transition: all 0.3s;
                    box-sizing: border-box;
                }
                .form-control:focus {
                    outline: none;
                    border-color: var(--accent);
                    background: rgba(255,255,255,0.1);
                    box-shadow: 0 0 15px var(--accent-transparent);
                }
                .btn-dt {
                    background: var(--accent);
                    color: var(--primary);
                    border: none;
                    padding: 1rem 2rem;
                    border-radius: 50px;
                    font-weight: 700;
                    cursor: pointer;
                    transition: all 0.3s;
                    text-transform: uppercase;
                    letter-spacing: 1px;
                    font-size: 0.85rem;
                }
                .btn-dt:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 5px 20px var(--accent-transparent);
                }
                .close {
                    font-size: 2rem;
                    color: white;
                    cursor: pointer;
                    opacity: 0.5;
                    transition: 0.3s;
                }
                .close:hover { opacity: 1; color: var(--accent); }

                @media (max-width: 768px) {
                    .item-card {
                        grid-template-columns: 1fr;
                        gap: 0.5rem;
                        padding: 1rem;
                    }
                    .item-codigo { font-size: 0.8rem; }
                    .item-descripcion { font-size: 0.85rem; }
                    .item-valores { 
                        flex-direction: column; 
                        gap: 0.3rem; 
                        margin: 0.5rem 0;
                    }
                    .dt-report {
                        padding: 1rem;
                    }
                    .dt-header {
                        flex-direction: column;
                        align-items: flex-start;
                        gap: 5px;
                    }
                    .dt-header div:last-child {
                        text-align: left !important;
                    }
                    .dt-grid {
                        grid-template-columns: 1fr;
                    }
                    .premium-card {
                        padding: 1rem;
                    }
                    .modal-content {
                        width: 95%;
                        margin: 10% auto;
                    }
                }
            </style>
            <button class="filtro-btn activo" onclick="filtrarItems('todos')">📋 Todos</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-1')">Cap 1</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-2')">Cap 2</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-3')">Cap 3</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-4')">Cap 4</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-5')">Cap 5</button>
            <button class="filtro-btn" onclick="filtrarItems('capitulo-6')">Cap 6</button>
            
            <div style="margin-left: auto; display: flex; gap: 1rem; align-items: center;">
                <label style="font-size: 0.7rem; color: var(--accent); font-weight: 800;">MONEDA:</label>
                <select id="currencySwitch" onchange="toggleCurrency()" style="background: var(--accent); color: var(--primary); border: none; border-radius: 20px; padding: 0.4rem 1rem; font-weight: 800; cursor: pointer;">
                    <option value="COP">PESOS (COP)</option>
                    <option value="USD">DÓLARES (USD)</option>
                </select>
                <button class="filtro-btn" onclick="abrirModalNuevoCapitulo()" style="border: 1px dashed var(--accent); color: var(--accent);">➕ Nuevo Capítulo</button>
            </div>
        </div>

        <div id="wbs-container">
            <!-- Los capítulos e ítems se cargan aquí dinámicamente -->
        </div>
    </div>

    <!-- Script de Barra Lateral Compartida -->
    <script src="sidebar-component.js"></script>

    <!-- Modal DT -->
    <div id="modalDT" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="cerrarModal('modalDT')">&times;</span>
                <h2 id="modal-dt-titulo">Crear Decisión Técnica</h2>
            </div>
            <div class="modal-body" id="modal-dt-body">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Capítulo -->
    <div id="modalNuevoCapitulo" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="cerrarModal('modalNuevoCapitulo')">&times;</span>
                <h2>➕ Proponer Nuevo Capítulo</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Número de Capítulo:</label>
                    <input type="number" id="nuevo-cap-numero" class="form-control" value="7" min="7" max="20">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Nombre del Capítulo:</label>
                    <input type="text" id="nuevo-cap-nombre" class="form-control" placeholder="Ej: SISTEMAS DE ENERGÍA">
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Descripción del Capítulo:</label>
                    <textarea id="nuevo-cap-descripcion" class="form-control" rows="4" placeholder="Describe el alcance y contenido del nuevo capítulo..."></textarea>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Justificación Técnica:</label>
                    <textarea id="nuevo-cap-justificacion" class="form-control" rows="4" placeholder="Por qué se necesita este nuevo capítulo..."></textarea>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">Presupuesto Estimado (COP):</label>
                    <input type="number" id="nuevo-cap-presupuesto" class="form-control" placeholder="Estimación inicial">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button class="btn btn-dt" onclick="generarDTNuevoCapitulo()">📋 Generar DT de Nuevo Capítulo</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cargar ADN Visual y Terminología -->
    <script src="lfc-terminology.js?v=1.0.0"></script>
    <script src="datos_wbs_TODOS_items.js?v=2.0.0"></script>
    
    <script>
        // Inyectar ADN en el DOM
        if (window.LFC_TERMINOLOGY) {
            const term = window.LFC_TERMINOLOGY;
            document.title = term.PROJECT.NAME;
            document.getElementById('main-dns-title').innerHTML = `📊 ${term.PROJECT.NAME} COMPLETA`;
            document.getElementById('main-dns-subtitle').textContent = `${term.PROJECT.FULL_LOCATION} | ${"DBCI FRA 236 SOVEREIGNTY"}`;
            document.getElementById('adn-version-tag').textContent = term.PROJECT.VERSION;
        }

        // Lógica de filtrado y carga dinámica
        let wbsData = window.datos_wbs || { items: [] };
        let viewCurrency = 'COP';
        const TRM = 4400;

        function toggleCurrency() {
            viewCurrency = document.getElementById('currencySwitch').value;
            cargarWBS();
        }

        function formatVal(val) {
            if (viewCurrency === 'USD') {
                return '$' + (val / TRM).toLocaleString('en-US', {maximumFractionDigits: 0}) + ' USD';
            }
            return '$' + val.toLocaleString('es-CO', {maximumFractionDigits: 0}) + ' COP';
        }
        
        function cargarWBS() {
            const container = document.getElementById('wbs-container');
            container.innerHTML = '';
            
            const itemsPorCapitulo = {};
            wbsData.items.forEach(item => {
                const cap = item.codigo.split('.')[0];
                if (!itemsPorCapitulo[cap]) itemsPorCapitulo[cap] = [];
                itemsPorCapitulo[cap].push(item);
            });

            document.getElementById('total-items').textContent = wbsData.items.length;
            document.getElementById('total-modificables').textContent = wbsData.items.filter(i => i.modificable).length;

            Object.keys(itemsPorCapitulo).sort().forEach(cap => {
                const seccion = document.createElement('div');
                seccion.className = 'capitulo-seccion';
                seccion.dataset.capitulo = cap;
                
                const names = {
                    '1': 'Control y Señalización',
                    '2': 'Telecomunicaciones',
                    '3': 'ITS y Seguridad+',
                    '4': 'Pasos a Nivel',
                    '5': 'Centro de Control',
                    '6': 'Material Rodante'
                };

                // Agrupar por nivel 2 (Sub-capítulo)
                const subCaps = {};
                itemsPorCapitulo[cap].forEach(item => {
                    const parts = item.codigo.split('.');
                    const sc = parts.length > 1 ? parts[0] + '.' + parts[1] : cap;
                    if (!subCaps[sc]) subCaps[sc] = [];
                    subCaps[sc].push(item);
                });

                let itemsHTML = '';
                Object.keys(subCaps).sort().forEach(sc => {
                    if (sc !== cap) {
                        itemsHTML += `<div style="padding: 1rem 2rem; color: var(--accent); font-weight: 700; opacity: 0.6; font-size: 0.8rem; letter-spacing: 2px;">SUB-CAPÍTULO ${sc}</div>`;
                    }
                    itemsHTML += subCaps[sc].map(item => `
                        <div class="item-card" data-capitulo="${cap}">
                            <div class="item-codigo">${item.codigo}</div>
                            <div class="item-descripcion">${item.descripcion}</div>
                            <div class="item-valores" style="display: flex; gap: 1rem;">
                                <div style="opacity: 0.6; font-size: 0.8rem;">${item.cantidad} ${item.unidad}</div>
                                <div style="font-weight: 700; color: var(--accent);">${formatVal(item.total_cop)}</div>
                            </div>
                            <div class="botones-accion">
                                <button class="filtro-btn" style="padding: 0.4rem 0.8rem; font-size: 0.7rem;" onclick="abrirModalDT('${item.codigo}')">PROPONER</button>
                            </div>
                        </div>
                    `).join('');
                });

                seccion.innerHTML = `
                    <div class="capitulo-header" onclick="toggleCapitulo('${cap}')">
                        <div class="capitulo-titulo">CAPÍTULO ${cap}: ${names[cap] || 'Otros'}</div>
                        <div class="capitulo-count">${itemsPorCapitulo[cap].length} ítems</div>
                    </div>
                    <div id="items-capitulo-${cap}">
                        ${itemsHTML}
                    </div>
                `;
                container.appendChild(seccion);
            });
        }

        function toggleCapitulo(cap) {
            const el = document.getElementById(`items-capitulo-${cap}`);
            el.classList.toggle('oculto');
        }

        function filtrarItems(filtro) {
            const secciones = document.querySelectorAll('.capitulo-seccion');
            document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('activo'));
            event.target.classList.add('activo');
            
            secciones.forEach(s => {
                if (filtro === 'todos') s.style.display = 'block';
                else s.style.display = filtro.endsWith(s.dataset.capitulo) ? 'block' : 'none';
            });
        }

        function abrirModalDT(codigo) { 
            const item = wbsData.items.find(i => i.codigo === codigo);
            if (!item) return;

            const modalBody = document.getElementById('modal-dt-body');
            document.getElementById('modal-dt-titulo').textContent = `Proponiendo Cambio: ${codigo}`;
            
            modalBody.innerHTML = `
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label">Descripción Actual:</label>
                    <div style="padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem;">${item.descripcion}</div>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label">Nueva Descripción / Justificación:</label>
                    <textarea id="edit-descripcion" class="form-control" rows="4" placeholder="Indique la razón del cambio y la nueva descripción..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Nuevo Presupuesto Estimado (COP):</label>
                    <input type="number" id="edit-presupuesto" class="form-control" value="${item.total_cop}">
                </div>
                <div style="margin-top: 2rem; text-align: right;">
                    <button class="btn-dt" onclick="generarDTExistente('${codigo}')">📋 Generar Reporte de Decisión Técnica</button>
                </div>
            `;
            document.getElementById('modalDT').style.display = 'block'; 
        }

        function generarDTExistente(codigo) {
            const item = wbsData.items.find(i => i.codigo === codigo);
            const nuevaDesc = document.getElementById('edit-descripcion').value;
            const nuevoPres = document.getElementById('edit-presupuesto').value;

            if (!nuevaDesc) {
                alert("Por favor ingrese una justificación para el cambio.");
                return;
            }

            const term = window.LFC_TERMINOLOGY || { PROJECT_NAME: "LFC STUDIO", VERSION: "v6.0" };
            const modalBody = document.getElementById('modal-dt-body');
            modalBody.innerHTML = `
                <div class="dt-report">
                    <div class="dt-header">
                        <div style="font-size: 1.5rem; font-weight: 900;">${term.PROJECT.NAME} | DECISIÓN TÉCNICA</div>
                        <div style="text-align: right; font-size: 0.8rem;">Ref: DT-WBS-${codigo}<br>Fecha: ${new Date().toLocaleDateString()}</div>
                    </div>
                    
                    <div class="dt-label">Ítem Afectado</div>
                    <div class="dt-value">${codigo} - ${item.descripcion.substring(0,60)}...</div>

                    <div class="dt-label">Sustento Técnico del Cambio</div>
                    <div class="dt-value">${nuevaDesc}</div>

                    <div class="dt-grid">
                        <div>
                            <div class="dt-label">Presupuesto Actual</div>
                            <div class="dt-value">$${item.total_cop.toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="dt-label">Presupuesto Propuesto</div>
                            <div class="dt-value">$${parseInt(nuevoPres).toLocaleString()}</div>
                        </div>
                    </div>

                    <div style="margin-top: 3rem; border-top: 1px solid #ddd; padding-top: 1rem; font-size: 0.7rem; opacity: 0.6;">
                        Este documento es una propuesta de cambio generada desde el Dashboard de Control ${term.PROJECT.NAME} ${term.PROJECT.VERSION}.
                    </div>
                    <button class="filtro-btn activo" style="margin-top: 2rem; width: 100%;" onclick="cerrarModal('modalDT')">Cerrar y Volver</button>
                </div>
            `;
        }

        function generarDTNuevoCapitulo() {
            const num = document.getElementById('nuevo-cap-numero').value;
            const nombre = document.getElementById('nuevo-cap-nombre').value;
            const desc = document.getElementById('nuevo-cap-descripcion').value;
            const just = document.getElementById('nuevo-cap-justificacion').value;
            const pres = document.getElementById('nuevo-cap-presupuesto').value;

            if (!nombre || !desc) {
                alert("Por favor complete al menos el nombre y la descripción.");
                return;
            }

            const term = window.LFC_TERMINOLOGY || { PROJECT_NAME: "LFC STUDIO" };
            const modalBody = document.querySelector('#modalNuevoCapitulo .modal-body');
            modalBody.innerHTML = `
                <div class="dt-report">
                    <div class="dt-header">
                        <div style="font-size: 1.5rem; font-weight: 900;">${term.PROJECT.NAME} | PROPUESTA NUEVO CAPÍTULO</div>
                        <div style="text-align: right; font-size: 0.8rem;">Ref: DT-NEW-CAP-${num}<br>Fecha: ${new Date().toLocaleDateString()}</div>
                    </div>
                    
                    <div class="dt-label">Nombre del Capítulo Propuesto</div>
                    <div class="dt-value">CAPÍTULO ${num}: ${nombre}</div>

                    <div class="dt-label">Alcance y Descripción</div>
                    <div class="dt-value">${desc}</div>

                    <div class="dt-label">Justificación Técnica</div>
                    <div class="dt-value">${just}</div>

                    <div class="dt-label">Presupuesto Estimado inicial</div>
                    <div class="dt-value" style="font-size: 1.5rem; font-weight: 800; color: #d32f2f;">$${parseInt(pres || 0).toLocaleString()} COP</div>

                    <div style="margin-top: 3rem; border-top: 1px solid #ddd; padding-top: 1rem; font-size: 0.7rem; opacity: 0.6; color: #666;">
                        Propuesta generada para revisión de Gerencia Técnica e Interventoría.
                    </div>
                    <button class="filtro-btn activo" style="margin-top: 2rem; width: 100%;" onclick="cerrarModal('modalNuevoCapitulo')">Cerrar y Volver</button>
                </div>
            `;
        }

        function abrirModalNuevoCapitulo() { document.getElementById('modalNuevoCapitulo').style.display = 'block'; }
        function cerrarModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if (id === 'modalNuevoCapitulo') {
                // Reset content for next time
                setTimeout(() => location.reload(), 100); 
            }
        }

        window.onload = cargarWBS;
    </script>
</body>
</html>
