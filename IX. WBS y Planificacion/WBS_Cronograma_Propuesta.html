<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="adn-page-title">Cargando...</title>
    <link rel="stylesheet" href="wbs-shared.css">
    <link rel="stylesheet" href="wbs-shared.css">
    <style>
        .gantt-chart-container {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            overflow-x: auto;
        }
        .gantt-row {
            display: flex;
            align-items: center;
            height: 45px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }
        .gantt-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .gantt-row.l3-row {
            height: 35px;
            margin-bottom: 4px;
            padding-left: 20px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.03);
            display: none; /* Ocultas por defecto */
        }
        .gantt-row.phase-row {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }
        .gantt-row.phase-row:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .gantt-label {
            width: 300px;
            min-width: 300px;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            padding-right: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .l3-row .gantt-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            padding-left: 1rem;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }
        .gantt-timeline {
            position: relative;
            flex-grow: 1;
            height: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }
        .l3-row .gantt-timeline {
            height: 15px;
        }
        .gantt-bar {
            position: absolute;
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--accent), #3a7bd5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .l3-row .gantt-bar {
            border-radius: 4px;
            opacity: 0.8;
            font-size: 0; /* Ocultar texto en barritas pequeñas */
        }
        .gantt-bar:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-transparent);
            z-index: 100;
            opacity: 1;
        }
        .gantt-bar::after {
            content: attr(data-label);
            position: absolute;
            top: -30px;
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid var(--accent);
        }
        .gantt-bar:hover::after {
            opacity: 1;
        }
        .gantt-header {
            display: flex;
            margin-left: 250px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }
        .gantt-month {
            flex: 1;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            padding-bottom: 5px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .phase-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            animation: fadeInScale 0.5s ease-out;
        }
        .phase-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toggle-icon {
            font-size: 0.8rem;
            transition: transform 0.3s;
            color: var(--accent);
        }
        .expanded .toggle-icon {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <div id="lfc-sidebar-container"></div>
    <div class="main-content-wrapper">
        <div class="premium-card" style="margin-bottom: 2rem; position: relative;">
            <div id="adn-version-tag" style="position: absolute; top: 10px; right: 20px; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">CARGANDO...</div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h1 class="premium-title" id="main-dns-title">📅 CRONOGRAMA MAESTRO (Multinivel)</h1>
                    <p id="main-dns-subtitle" style="opacity: 0.7; font-weight: 300;">Cargando propuesta de ejecución...</p>
                </div>
            </div>
        </div>

        <div class="metrics-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--accent);" id="totalMeses">60</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">MESES TOTALES</div>
            </div>
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--success);" id="mesActual">M4</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">MES ACTUAL</div>
            </div>
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--danger);">12</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">MESES BUFFER</div>
            </div>
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: #fff;" id="totalItemsL3">--</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">ÍTEMS L3 SINCRONIZADOS</div>
            </div>
        </div>

        <div class="premium-card" style="margin-bottom: 2rem;">
            <h2 style="color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">📊 DIAGRAMA DE GANTT (Click para Desplegar L3)</h2>
            <div class="gantt-chart-container" id="ganttChart">
                <!-- Se genera dinamicamente -->
            </div>
        </div>

        <div class="premium-card">
            <h2 style="color: var(--accent); margin-bottom: 1.5rem;">🚀 ESTRATEGIA POR FASES</h2>
            <div id="timelineContainer">
                <!-- Se carga dinamicamente -->
            </div>
        </div>
    </div>

    <!-- Integración LFC v6.3: DBCI + Datos L1/L2 + Datos L3 -->
    <script src="lfc-terminology.js?v=6.3.1"></script>
    <script src="sidebar-component.js?v=6.3.1"></script>
    <script src="cronograma_datos.js?v=6.3.1" onerror="console.error('CRITICAL: Failed to load cronograma_datos.js')"></script>
    <script src="wbs_presupuestal_datos.js?v=6.3.1" onerror="console.error('CRITICAL: Failed to load wbs_presupuestal_datos.js')"></script> 
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Inyectar ADN
            if (window.LFC_TERMINOLOGY) {
                const term = window.LFC_TERMINOLOGY;
                document.getElementById('adn-page-title').textContent = `CRONOGRAMA multinivel - ${term.PROJECT.NAME}`;
                document.getElementById('main-dns-title').innerHTML = `📅 CRONOGRAMA MAESTRO`;
                document.getElementById('main-dns-subtitle').textContent = `${term.PROJECT.FULL_LOCATION} | ${term.PROJECT.VERSION} | Pureza SICC`;
                document.getElementById('adn-version-tag').textContent = term.PROJECT.VERSION;
            }
            if (typeof window.cronogramaData === 'undefined' || typeof window.wbsDataPresupuestal === 'undefined') {
                const missingFiles = [];
                if (typeof window.cronogramaData === 'undefined') missingFiles.push("cronograma_datos.js (L1/L2)");
                if (typeof window.wbsDataPresupuestal === 'undefined') missingFiles.push("wbs_presupuestal_datos.js (L3)");
                
                console.error("Fallo de Inyección Transversal: ", missingFiles.join(", "));
                document.getElementById('ganttChart').innerHTML = `
                    <div style="background: rgba(255,0,0,0.1); border: 2px solid red; padding: 2rem; border-radius: 12px; text-align: center;">
                        <h3 style="color: #ff4d4d; margin-bottom: 1rem;">❌ ERROR DE CARGA DE DATOS</h3>
                        <p style="color: #fff; opacity: 0.8;">No se pudieron cargar los siguientes archivos: <br> <strong>${missingFiles.join("<br> ")}</strong></p>
                        <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--accent);">Acción: Ejecute <code>lfc sync</code> localmente y verifique el despliegue.</p>
                    </div>
                `;
                return;
            }

            const data = window.cronogramaData;
            const l3Data = window.wbsDataPresupuestal;
            const container = document.getElementById('timelineContainer');
            const gantt = document.getElementById('ganttChart');
            
            document.getElementById('totalItemsL3').textContent = l3Data.length;

            // Mapeo L3 a Fases (Motor de Inferencia v6.3)
            const mapL3ToFases = () => {
                const asignaciones = {};
                data.fases.forEach(f => asignaciones[f.id] = []);
                
                l3Data.forEach(item => {
                    let faseId = 'F4'; // Default Obras
                    if (item.tipo === 'SERVICIO' && item.descripcion.toLowerCase().includes('ingeniería')) faseId = 'F1';
                    else if (item.capitulo === '6') faseId = 'F2'; // Material Rodante
                    else if (item.capitulo === '5') faseId = 'F3'; // CCO
                    else if (item.capitulo === '3' || item.capitulo === '4') faseId = 'F5'; // ITS / PaN
                    else if (item.tipo === 'SERVICIO' && item.descripcion.toLowerCase().includes('prueba')) faseId = 'F6';
                    else if (item.tipo === 'SERVICIO' && item.descripcion.toLowerCase().includes('capacitación')) faseId = 'F7';
                    
                    if(asignaciones[faseId]) {
                        asignaciones[faseId].push(item);
                    }
                });
                return asignaciones;
            };

            const l3PorFase = mapL3ToFases();

            // 1. Render Timeline
            container.innerHTML = '';
            data.fases.forEach(fase => {
                const numL3 = l3PorFase[fase.id] ? l3PorFase[fase.id].length : 0;
                const card = document.createElement('div');
                card.className = 'phase-card';
                card.innerHTML = `
                    <div class="phase-meta">
                        <span style="font-weight: 800; color: var(--accent);">${fase.nombre}</span>
                        <span class="premium-tag ${fase.estado === 'EN CURSO' ? 'tag-medium' : (fase.estado === 'RESERVA' ? 'tag-high' : 'tag-low')}">
                            ${fase.estado}
                        </span>
                    </div>
                    <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 1rem;">${fase.descripcion}</p>
                    <div style="display: flex; gap: 2rem; font-size: 0.8rem; font-weight: 700; flex-wrap: wrap;">
                        <span>📅 MES ${fase.mes_inicio} - ${fase.mes_fin}</span>
                        <span>⏳ DURACIÓN: ${fase.duracion_meses} MESES</span>
                        <span style="color: #00d2ff;">⚙️ ÍTEMS L3 SUBORDINADOS: ${numL3}</span>
                        ${fase.avance_pct > 0 ? `<span style="color: var(--success);">⚡ AVANCE: ${fase.avance_pct}%</span>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });

            // 2. Render Gantt Multinivel
            const totalMeses = 60;
            let ganttHTML = '<div class="gantt-header">';
            for(let i=0; i<=totalMeses; i+=5) {
                ganttHTML += `<div class="gantt-month" style="flex: ${i === 60 ? '0' : '5'}">M${i}</div>`;
            }
            ganttHTML += '</div>';

            data.fases.forEach((fase, idx) => {
                const startPct = (fase.mes_inicio / totalMeses) * 100;
                const widthPct = (fase.duracion_meses / totalMeses) * 100;
                const colors = ['#00d2ff', '#3a7bd5', '#92fe9d', '#00c9ff', '#f093fb', '#f5576c', '#43e97b', '#38f9d7'];
                const color = colors[idx % colors.length];
                const hijosL3 = l3PorFase[fase.id] || [];

                // Fila Principal (Fase L1/L2)
                ganttHTML += `
                    <div class="gantt-row phase-row" onclick="togglePhase('${fase.id}')">
                        <div class="gantt-label">
                            <span class="toggle-icon">▶</span>
                            ${fase.nombre} (${hijosL3.length})
                        </div>
                        <div class="gantt-timeline">
                            <div class="gantt-bar" 
                                 style="left: ${startPct}%; width: ${widthPct}%; background: ${color};"
                                 data-label="${fase.nombre}: Mes ${fase.mes_inicio}-${fase.mes_fin}">
                                ${fase.duracion_meses}M
                            </div>
                        </div>
                    </div>
                `;

                // Sub-filas L3 (Ocultas inicialmente)
                hijosL3.forEach((item, l3Idx) => {
                    // Simulación de distribución temporal dentro de la fase basada en su índice
                    const chunkOffset = (l3Idx / hijosL3.length) * (widthPct * 0.8);
                    const chunkWidth = widthPct / (hijosL3.length > 5 ? 5 : hijosL3.length); // Máximo ancho
                    const finalWidth = chunkWidth > widthPct ? widthPct : chunkWidth;
                    
                    ganttHTML += `
                        <div class="gantt-row l3-row child-of-${fase.id}">
                            <div class="gantt-label" title="${item.item} - ${item.descripcion}">
                                [${item.item}] ${item.descripcion}
                            </div>
                            <div class="gantt-timeline">
                                <div class="gantt-bar" 
                                     style="left: ${startPct + chunkOffset}%; width: ${finalWidth}%; background: ${color}; opacity: 0.6;"
                                     data-label="${item.item}: ${item.descripcion}">
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
            gantt.innerHTML = ganttHTML;
        });

        // Función global para expandir/contraer
        window.togglePhase = function(faseId) {
            const row = event.currentTarget;
            row.classList.toggle('expanded');
            const icon = row.querySelector('.toggle-icon');
            if (row.classList.contains('expanded')) {
                icon.textContent = '▼';
            } else {
                icon.textContent = '▶';
            }
            
            const children = document.querySelectorAll(`.child-of-${faseId}`);
            children.forEach(child => {
                if (child.style.display === 'flex') {
                    child.style.display = 'none';
                } else {
                    child.style.display = 'flex';
                }
            });
        };

        // MODO DEBUG (Ctrl+Shift+D)
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                console.log("🛠️ LFC DEBUG MODE ACTIVATED");
                console.log("Cronograma Data (L1/L2):", window.cronogramaData);
                console.log("WBS Data (L3):", window.wbsDataPresupuestal);
                alert("Debug Mode: Revisa la consola para ver los objetos de datos.");
            }
        });
    </script>
</body>
</html>
