<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="adn-page-title">Cargando...</title>
    <link rel="stylesheet" href="wbs-shared.css">
    <link rel="stylesheet" href="wbs-shared.css">
    <style>
        .gantt-chart-container {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            overflow-x: auto;
        }
        .gantt-row {
            display: flex;
            align-items: center;
            height: 45px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gantt-label {
            width: 250px;
            min-width: 250px;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            padding-right: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gantt-timeline {
            position: relative;
            flex-grow: 1;
            height: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }
        .gantt-bar {
            position: absolute;
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--accent), #3a7bd5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .gantt-bar:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-transparent);
            z-index: 100;
        }
        .gantt-bar::after {
            content: attr(data-label);
            position: absolute;
            top: -30px;
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid var(--accent);
        }
        .gantt-bar:hover::after {
            opacity: 1;
        }
        .gantt-header {
            display: flex;
            margin-left: 250px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }
        .gantt-month {
            flex: 1;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            padding-bottom: 5px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .phase-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            animation: fadeInScale 0.5s ease-out;
        }
        .phase-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="lfc-sidebar-container"></div>
    <div class="main-content-wrapper">
        <div class="premium-card" style="margin-bottom: 2rem; position: relative;">
            <div id="adn-version-tag" style="position: absolute; top: 10px; right: 20px; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">CARGANDO...</div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h1 class="premium-title" id="main-dns-title">📅 CRONOGRAMA MAESTRO</h1>
                    <p id="main-dns-subtitle" style="opacity: 0.7; font-weight: 300;">Cargando propuesta de ejecución...</p>
                </div>
            </div>
        </div>

        <div class="metrics-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--accent);" id="totalMeses">60</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">MESES TOTALES</div>
            </div>
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--success);" id="mesActual">M4</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">MES ACTUAL</div>
            </div>
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: var(--danger);">12</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">MESES BUFFER</div>
            </div>
            <div class="premium-card" style="padding: 1rem; text-align: center;">
                <div style="font-size: 2rem; font-weight: 800; color: #fff;">133</div>
                <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">ÍTEMS WBS</div>
            </div>
        </div>

        <div class="premium-card" style="margin-bottom: 2rem;">
            <h2 style="color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">📊 DIAGRAMA DE GANTT</h2>
            <div class="gantt-chart-container" id="ganttChart">
                <!-- Se genera dinamicamente -->
            </div>
        </div>

        <div class="premium-card">
            <h2 style="color: var(--accent); margin-bottom: 1.5rem;">🚀 ESTRATEGIA POR FASES</h2>
            <div id="timelineContainer">
                <!-- Se carga dinamicamente -->
            </div>
        </div>
    </div>

    <script src="lfc-terminology.js?v=1.0.0"></script>
    <script src="sidebar-component.js"></script>
    <script src="cronograma_datos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Inyectar ADN
            if (window.LFC_TERMINOLOGY) {
                const term = window.LFC_TERMINOLOGY;
                document.getElementById('adn-page-title').textContent = `${term.SYSTEMS.GANTT} - ${term.APP_SHORT_NAME}`;
                document.getElementById('main-dns-title').innerHTML = `📅 ${term.SYSTEMS.GANTT.toUpperCase()}`;
                document.getElementById('main-dns-subtitle').textContent = `${term.FULL_LOCATION} | ${term.VERSION}`;
                document.getElementById('adn-version-tag').textContent = term.VERSION;
            }
            if (typeof window.cronogramaData === 'undefined') {
                console.error("No se cargaron los datos del cronograma.");
                return;
            }

            const data = window.cronogramaData;
            const container = document.getElementById('timelineContainer');
            const gantt = document.getElementById('ganttChart');
            
            // 1. Render Timeline
            container.innerHTML = '';
            data.fases.forEach(fase => {
                const card = document.createElement('div');
                card.className = 'phase-card';
                card.innerHTML = `
                    <div class="phase-meta">
                        <span style="font-weight: 800; color: var(--accent);">${fase.nombre}</span>
                        <span class="premium-tag ${fase.estado === 'EN CURSO' ? 'tag-medium' : (fase.estado === 'RESERVA' ? 'tag-high' : 'tag-low')}">
                            ${fase.estado}
                        </span>
                    </div>
                    <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 1rem;">${fase.descripcion}</p>
                    <div style="display: flex; gap: 2rem; font-size: 0.8rem; font-weight: 700; flex-wrap: wrap;">
                        <span>📅 MES ${fase.mes_inicio} - ${fase.mes_fin}</span>
                        <span>⏳ DURACIÓN: ${fase.duracion_meses} MESES</span>
                        ${fase.avance_pct > 0 ? `<span style="color: var(--success);">⚡ AVANCE: ${fase.avance_pct}%</span>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });

            // 2. Render Gantt
            const totalMeses = 60;
            let ganttHTML = '<div class="gantt-header">';
            for(let i=0; i<=totalMeses; i+=5) {
                ganttHTML += `<div class="gantt-month" style="flex: ${i === 60 ? '0' : '5'}">M${i}</div>`;
            }
            ganttHTML += '</div>';

            data.fases.forEach((fase, idx) => {
                const startPct = (fase.mes_inicio / totalMeses) * 100;
                const widthPct = (fase.duracion_meses / totalMeses) * 100;
                const colors = ['#00d2ff', '#3a7bd5', '#92fe9d', '#00c9ff', '#f093fb', '#f5576c', '#43e97b', '#38f9d7'];
                const color = colors[idx % colors.length];

                ganttHTML += `
                    <div class="gantt-row">
                        <div class="gantt-label">${fase.nombre}</div>
                        <div class="gantt-timeline">
                            <div class="gantt-bar" 
                                 style="left: ${startPct}%; width: ${widthPct}%; background: ${color};"
                                 data-label="${fase.nombre}: Mes ${fase.mes_inicio}-${fase.mes_fin}">
                                ${fase.duracion_meses}M
                            </div>
                        </div>
                    </div>
                `;
            });
            gantt.innerHTML = ganttHTML;
        });
    </script>
</body>
</html>
